[pytest]
# Configuración de pytest para BESTLIB

# Dónde buscar tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py

# Patrón de clases de test
python_classes = Test*

# Patrón de funciones de test
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizados
markers =
    slow: Tests lentos que requieren mucho tiempo
    integration: Tests de integración que requieren Jupyter
    jupyter: Tests que requieren estar en Jupyter Notebook
    pandas: Tests que requieren pandas

# Ignorar warnings de deprecación de BESTLIB (los estamos probando)
filterwarnings =
    ignore::DeprecationWarning:BESTLIB
    ignore::FutureWarning:BESTLIB

